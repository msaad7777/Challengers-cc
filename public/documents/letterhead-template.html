<!DOCTYPE html>
<!--
  Challengers Cricket Club — Official Letterhead Template
  ------------------------------------------------------
  This is the canonical HTML letterhead. Replaces the older static PDF
  ("Letter head.pdf" at the repo root) which had the stale Meadowgate
  address and the old phone number.

  Header band:  logo on left, contact info right-aligned
  Footer band:  phone · address · email, three columns

  USAGE
  -----
  1. Open this file in a browser (preview will look like Letter paper).
  2. Cmd+P (Mac) / Ctrl+P (Win) → Destination: "Save as PDF" →
     Margins: Default → tick "Background graphics" → Save.
  3. The exported PDF can be used as the club's standalone letterhead
     PDF, or as a base for any new letter (open in any PDF editor and
     overlay your body text in the white middle area).
  4. To produce a letter directly (not just a letterhead), edit the
     <main class="letter-body"> section below — replace the placeholder
     content with your letter text, then print-to-PDF.

  CONTACT DETAILS — keep in sync with the federal corporate profile and
  the bylaws (Article 1.2):
    Phone:    431-726-3434
    Email:    contact@challengerscc.ca
    Address:  790 Capulet Lane, London ON N6H 0J8
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Letterhead — Challengers Cricket Club</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    color: #1a1a1a;
    background: #e8e8e8;
    line-height: 1.5;
  }

  .page {
    width: 8.5in;
    min-height: 11in;
    margin: 0.4in auto;
    background: #ffffff;
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* ── Header band ─────────────────────────────────────────────────── */
  .header-band {
    background: #0c3d22;
    color: #fff;
    padding: 28px 56px 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
  }
  /* Thin gold underscore between band and body */
  .header-band::after {
    content: '';
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 2px;
    background: #1a1a1a;
  }

  .logo-tile {
    width: 130px;
    height: 130px;
    background: #0a0a0a;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: -8px;
    margin-bottom: -32px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.25);
    overflow: hidden;
  }
  .logo-tile img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .header-contact {
    text-align: right;
    font-size: 13.5px;
    line-height: 1.6;
    color: #e8f0ea;
  }
  .header-contact .line {
    display: block;
  }
  .header-contact a {
    color: #e8f0ea;
    text-decoration: none;
  }

  /* ── Body ────────────────────────────────────────────────────────── */
  .letter-body {
    flex: 1;
    padding: 64px 64px 56px;
    font-size: 13.5px;
    color: #1a1a1a;
  }
  .letter-body.is-template-blank {
    /* Intentionally blank when using as a pure letterhead */
  }

  /* ── Footer band ─────────────────────────────────────────────────── */
  .footer-band {
    background: #0c3d22;
    color: #fff;
    padding: 16px 56px;
    display: grid;
    grid-template-columns: 1fr 1.5fr 1.5fr;
    gap: 22px;
    align-items: center;
    font-size: 12.5px;
    line-height: 1.4;
    color: #e8f0ea;
  }
  .footer-band .item {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .footer-band .icon {
    width: 22px;
    height: 22px;
    background: rgba(255,255,255,0.08);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    color: #d8e7dc;
  }
  .footer-band .icon svg {
    width: 13px;
    height: 13px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .footer-band a {
    color: inherit;
    text-decoration: none;
  }

  /* ── Print ───────────────────────────────────────────────────────── */
  @page {
    size: letter;
    margin: 0;
  }
  @media print {
    body { background: #fff !important; }
    .page {
      margin: 0 !important;
      box-shadow: none !important;
      width: 100% !important;
      min-height: 100vh !important;
    }
    * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
</style>
</head>
<body>

<div class="page">

  <!-- ── HEADER BAND ─────────────────────────────────────────────── -->
  <header class="header-band">
    <div class="logo-tile">
      <!-- Logo lives at /ccc-logo.png in the repo. When this template is
           opened directly (file:// path), the image may fail to load in
           some browsers; if so, use the served version under
           http://localhost:3000/documents/letterhead-template.html. -->
      <img src="/ccc-logo.png" alt="Challengers Cricket Club">
    </div>
    <div class="header-contact">
      <span class="line">431-726-3434</span>
      <span class="line"><a href="mailto:contact@challengerscc.ca">contact@challengerscc.ca</a></span>
      <span class="line">790 Capulet Lane</span>
      <span class="line">London ON N6H 0J8</span>
    </div>
  </header>

  <!-- ── BODY ────────────────────────────────────────────────────── -->
  <main class="letter-body is-template-blank">
    <!-- Letter body goes here. Leave blank to use as a pure letterhead. -->
  </main>

  <!-- ── FOOTER BAND ─────────────────────────────────────────────── -->
  <footer class="footer-band">
    <div class="item">
      <span class="icon">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.37 1.9.72 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.35 1.85.59 2.81.72A2 2 0 0 1 22 16.92z"/></svg>
      </span>
      <a href="tel:+14317263434">431-726-3434</a>
    </div>
    <div class="item">
      <span class="icon">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      </span>
      <span>790 Capulet Lane<br>London ON N6H 0J8</span>
    </div>
    <div class="item">
      <span class="icon">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      </span>
      <a href="mailto:contact@challengerscc.ca">contact@challengerscc.ca</a>
    </div>
  </footer>

</div>

</body>
</html>
